<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Космический исследователь</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<canvas id="starfield"></canvas>

<nav class="navbar navbar-expand-lg navbar-dark navbar-cosmic fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">🌌 Космический исследователь</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'mars' %}active{% endif %}" href="{{ url_for('mars') }}">🔴 Марс</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'jupiter' %}active{% endif %}" href="{{ url_for('jupiter') }}">🟠 Юпитер</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'saturn' %}active{% endif %}" href="{{ url_for('saturn') }}">🪐 Сатурн</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'glossary' %}active{% endif %}" href="{{ url_for('glossary') }}">📚 Глоссарий</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'about' %}active{% endif %}" href="{{ url_for('about') }}">👨‍🚀 Об авторе</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

<footer class="text-center py-4 mt-5" style="border-top:1px solid var(--border); color:#3a4a60; position:relative; z-index:1;">
    <small>🌌 Космический исследователь &mdash; Горбунов Даниил, ИРНИТУ 2025</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/cosmic.js') }}"></script>
</body>
</html>
